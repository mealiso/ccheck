<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Kart Veri Üretici</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root {
      color-scheme: dark;
      --bg: #09090b; /* Zinc 950 */
      --card-bg: rgba(24, 24, 27, 0.6); /* Zinc 900 + opacity for blur */
      --border: #27272a; /* Zinc 800 */
      --border-hover: #3f3f46; /* Zinc 700 */
      --text-main: #fafafa; /* Zinc 50 */
      --text-muted: #a1a1aa; /* Zinc 400 */
      --primary: #3b82f6; /* Blue 500 */
      --primary-hover: #2563eb; /* Blue 600 */
      --secondary: #27272a; /* Zinc 800 */
      --secondary-hover: #3f3f46; /* Zinc 700 */
      --focus-ring: rgba(59, 130, 246, 0.4);
      --input-bg: #09090b; /* Zinc 950 */
    }

    * {
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      margin: 0;
      background-color: var(--bg);
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.08), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.08), transparent 25%);
      color: var(--text-main);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .container {
      width: min(900px, 100%);
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,255,255,0.02) inset;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .header-area {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }

    .header-text h1 {
      margin: 0 0 8px;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #60a5fa, #c084fc, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientShift 5s ease infinite;
      background-size: 200% 200%;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .header-text .sub {
      margin: 0;
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .stats-badge {
      background: var(--secondary);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stats-badge span {
      color: #fff;
      background: var(--primary);
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .field-group {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      position: relative;
      overflow: hidden;
    }

    .field-group::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 4px; height: 100%;
      background: var(--border-hover);
      transition: background 0.3s;
    }

    .field-group:focus-within::before {
      background: var(--primary);
    }

    .field-group-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 12px;
      font-weight: 700;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      transition: color 0.2s;
    }

    .field:focus-within label {
      color: var(--text-main);
    }

    input, select, textarea {
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text-main);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      transition: all 0.2s ease;
      outline: none;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1) inset;
    }

    input:hover, select:hover, textarea:hover {
      border-color: var(--border-hover);
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--focus-ring);
    }

    textarea {
      width: 100%;
      min-height: 220px;
      resize: vertical;
      margin-top: 24px;
      font-family: 'JetBrains Mono', Consolas, monospace;
      font-size: 13px;
      line-height: 1.5;
    }

    textarea::-webkit-scrollbar {
      width: 8px;
    }
    textarea::-webkit-scrollbar-track {
      background: transparent;
    }
    textarea::-webkit-scrollbar-thumb {
      background: var(--border-hover);
      border-radius: 4px;
    }
    textarea::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    button {
      cursor: pointer;
      border: 1px solid transparent;
      background: var(--primary);
      color: white;
      font-weight: 600;
      font-size: 14px;
      padding: 12px 24px;
      border-radius: 10px;
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2), 0 2px 4px -1px rgba(59, 130, 246, 0.1);
    }

    button:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 8px -1px rgba(59, 130, 246, 0.3), 0 4px 6px -1px rgba(59, 130, 246, 0.2);
    }

    button:active {
      transform: translateY(0);
    }

    button.secondary {
      background: var(--secondary);
      border-color: var(--border);
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
      color: var(--text-main);
    }

    button.secondary:hover {
      background: var(--secondary-hover);
      border-color: var(--text-muted);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
    }

    .hint {
      margin-top: 12px;
      color: var(--text-muted);
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .hint::before {
      content: "ℹ";
      font-size: 14px;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--primary);
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 50;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    @media (max-width: 760px) {
      .grid {
        grid-template-columns: 1fr;
      }
      .container {
        padding: 20px;
      }
      .toast {
        bottom: 16px;
        right: 16px;
        left: 16px;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="header-area">
      <div class="header-text">
        <h1>Test Kart Veri Üretici</h1>
        <p class="sub">Sadece test/form doğrulama amaçlıdır, gerçek ödeme işlemi için kullanılamaz.</p>
      </div>
      <div class="stats-badge">
        Üretilen <span id="statsCount">0</span>
      </div>
    </div>

    <section class="grid">
      <!-- Grup 1: Temel Ayarlar -->
      <div class="field-group">
        <div class="field-group-title">Temel Ayarlar</div>
        <div class="field" style="margin-bottom: 12px;">
          <label for="count">Adet</label>
          <input id="count" type="number" min="1" max="5000" value="20">
        </div>
        <div class="field">
          <label for="binPrefix">BIN Benzeri Önek (Test)</label>
          <input id="binPrefix" type="text" inputmode="numeric" maxlength="15" value="4539" placeholder="Örn: 4539">
        </div>
      </div>

      <!-- Grup 2: Tarih Ayarları -->
      <div class="field-group">
        <div class="field-group-title">Tarih Ayarları</div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px;">
          <div class="field">
            <label for="monthStart">Ay (Baş)</label>
            <input id="monthStart" type="number" min="1" max="12" value="1">
          </div>
          <div class="field">
            <label for="monthEnd">Ay (Bit)</label>
            <input id="monthEnd" type="number" min="1" max="12" value="12">
          </div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
          <div class="field">
            <label for="yearStart">Yıl (Baş)</label>
            <input id="yearStart" type="number" min="2026" max="2099" value="2026">
          </div>
          <div class="field">
            <label for="yearEnd">Yıl (Bit)</label>
            <input id="yearEnd" type="number" min="2026" max="2099" value="2032">
          </div>
        </div>
      </div>

      <!-- Grup 3: Format Ayarları -->
      <div class="field-group">
        <div class="field-group-title">Format & CVC</div>
        <div class="field" style="margin-bottom: 12px;">
          <label for="cvcLength">CVC/CVV Hane</label>
          <select id="cvcLength">
            <option value="3" selected>3 Hane (Visa/MC)</option>
            <option value="4">4 Hane (Amex)</option>
          </select>
        </div>
        <div class="field">
          <label for="formatSelect">Çıktı Formatı</label>
          <select id="formatSelect">
            <option value="pipe" selected>Pipe Ayracı (|)</option>
            <option value="csv">CSV Formatı</option>
            <option value="json">JSON Array</option>
          </select>
        </div>
      </div>
      <!-- Yeni Eklendi: Algoritma & CVC Kuralı Ayarları -->
      <div class="field-group" style="grid-column: 1 / -1;">
        <div class="field-group-title">Gelişmiş Algoritma Ayarları</div>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;">
          
          <div class="field">
            <label for="luhnCheck">Luhn (Mod10) Algoritması</label>
            <select id="luhnCheck">
              <option value="yes" selected>Aktif (Gerçekçi Doğrulama)</option>
              <option value="no">Kapalı (Tamamen Rastgele)</option>
            </select>
          </div>

          <div class="field">
            <label for="bankSelect">Hazır Banka Şablonu (Ön Ayar)</label>
            <select id="bankSelect">
              <option value="custom" selected>Özel BIN Kullan</option>
              <option value="4539">Visa Classic (4539)</option>
              <option value="5168">Mastercard (5168)</option>
              <option value="3772">Amex (3772)</option>
              <option value="6011">Discover (6011)</option>
            </select>
          </div>

          <div class="field">
            <label for="dateLogic">Tarih Mantığı</label>
            <select id="dateLogic">
              <option value="random" selected>Rastgele Üret</option>
              <option value="future">Sadece Gelecek Tarihler (Valid)</option>
              <option value="past">Sadece Geçmiş Tarihler (Expired)</option>
            </select>
          </div>

        </div>
      </div>
    </section>

    <div class="actions">
      <button id="generateBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px; vertical-align:middle;"><path d="M21 12a9 9 0 0 1-9 9m9-9a9 9 0 0 0-9-9m9 9H3m9 9a9 9 0 0 1-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 0 1 9-9"/></svg>
        Veri Üret
      </button>
      <button id="copyBtn" class="secondary">Kopyala</button>
      <button id="downloadBtn" class="secondary">İndir</button>
      <button id="clearBtn" class="secondary" style="margin-left:auto;">Temizle</button>
    </div>

    <textarea id="output" placeholder="Üretilen kayıtlar burada görünecek..."></textarea>
    <div class="hint" id="formatHint">Format: kart_numarası|AA|YYYY|CVC</div>
  </main>

  <div id="toast" class="toast">İşlem başarılı!</div>

  <script src="./app.js"></script>
</body>
</html>
